# Example init file for a 2-node mesh: Node 1
#
# Usage:
#   bm_sbc_multinode --init examples/node1.toml

node-id    = "0x0000000000000001"
cfg-dir    = "/tmp/bm_node1"
socket-dir = "/tmp"
peers      = ["0x0000000000000002"]

# Logging (all optional; CLI flags override these values)
# log-dir    = "/var/log/bm_sbc"  # default when omitted
# log-level  = "info"             # trace/debug/info/warn/error/fatal
# log-stdout = false              # true to also write logs to stdout
